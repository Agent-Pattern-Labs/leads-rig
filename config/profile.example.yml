# Lead ingest settings for the reference client.
# Prefer environment variables for secrets in shared terminals.

api:
  # Set the deployed Cold Agent Leads API base URL through PUBLIC_LEADS_API,
  # or put it here for a non-shared local profile. Example:
  # base_url: "https://cold-agent-leads.example.com"
  base_url: ""
  ingest_path: "/api/lead-ingests"
  # Optional compatibility only: set when reading ADMIN_API_TOKEN/ADMIN_EMAILS
  # from a local cold-agent-leads checkout. Not needed for upstream ingest.
  target_project: ""
  operator_email: ""
  operator_email_header: "X-Admin-Email"
  auth_header: "Authorization"
  auth_scheme: "Bearer"
  auth_token_env: "PUBLIC_LEADS_API_TOKEN"

crawl:
  max_pages: 10
  timeout_ms: 14000
  max_domains_per_batch: 50
  concurrency: 2
  page_concurrency: 1
  dns_concurrency: 8
  cache_path: ".leadharness-cache/crawler-cache.json"
  robots_cache_ttl_ms: 86400000
  dns_cache_ttl_ms: 604800000
  page_cache: false
  page_cache_ttl_ms: 0
  stop_after_good_leads: 0
  stop_after_contact_path: false
  user_agent: "PublicLeadsBot/0.1 (+https://example.com/public-leads)"

batch:
  batch_timeout_ms: 8000

lead_policy:
  min_confidence: 30
  allowed_email_types:
    - person
    - role
    - contact_path
  required_fields:
    - domain
    - sourceUrl
    - evidence
    - emailType
    - verificationStatus
    - confidence
